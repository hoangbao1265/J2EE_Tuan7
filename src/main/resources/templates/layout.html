<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title} ?: 'Course Registration'"> </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a class="nav-brand" th:href="@{/home}">
            <i class="fas fa-graduation-cap"></i>
            <span>EduRegister</span>
        </a>

        <form class="search-form" th:action="@{/home}" method="get">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Tìm kiếm học phần..." class="search-input">
                <button type="submit" class="search-btn">Tìm</button>
            </div>
        </form>

        <div class="nav-links">
            <a th:href="@{/home}" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>

            <th:block sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/courses}" class="nav-link admin-link">
                    <i class="fas fa-cog"></i> Quản lý
                </a>
            </th:block>

            <th:block sec:authorize="hasRole('STUDENT')">
                <a th:href="@{/my-courses}" class="nav-link">
                    <i class="fas fa-book-open"></i> Học phần của tôi
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <div class="user-menu">
                    <span class="user-name">
                        <i class="fas fa-user-circle"></i>
                        <sec:authentication property="name"/>
                    </span>
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn-logout">
                            <i class="fas fa-sign-out-alt"></i> Đăng xuất
                        </button>
                    </form>
                </div>
            </th:block>

            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn-nav-login">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </a>
                <a th:href="@{/register}" class="btn-nav-register">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </a>
            </th:block>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<main class="main-content">
    <th:block th:replace="${content}"></th:block>
</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>EduRegister</span>
        </div>
        <p>Hệ thống đăng ký học phần sinh viên &copy; 2024</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
