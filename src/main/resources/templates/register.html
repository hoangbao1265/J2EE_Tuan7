<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - EduRegister</title>
    <meta name="description" content="Tạo tài khoản sinh viên mới trên hệ thống EduRegister">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-bg">
    <div class="auth-blob blob-1"></div>
    <div class="auth-blob blob-2"></div>
    <div class="auth-blob blob-3"></div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a th:href="@{/home}" class="auth-brand">
                <i class="fas fa-graduation-cap"></i>
                <span>EduRegister</span>
            </a>
            <h1 class="auth-title">Tạo tài khoản</h1>
            <p class="auth-subtitle">Đăng ký để bắt đầu hành trình học tập</p>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i> Tên đăng nhập
                </label>
                <input type="text" id="username" name="username"
                       class="form-input" placeholder="Nhập username (ít nhất 3 ký tự)..."
                       th:value="${username}" required minlength="3"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" name="email"
                       class="form-input" placeholder="Nhập email..."
                       th:value="${email}" required
                       autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Mật khẩu
                </label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" name="password"
                           class="form-input" placeholder="Ít nhất 6 ký tự..."
                           required minlength="6"
                           autocomplete="new-password">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="password-strength" id="pwdStrength">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
            </div>

            <button type="submit" class="btn-auth" id="registerBtn">
                <i class="fas fa-user-plus"></i> Đăng ký tài khoản
            </button>
        </form>

        <div class="auth-footer">
            <p>Đã có tài khoản? <a th:href="@{/login}" class="auth-link">Đăng nhập</a></p>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
